<!DOCTYPE html>
<html>

<head>

    <title>Sign Up</title>

    <link
        rel="stylesheet"
        href="{{ url_for(
            'static',
            filename='css/style.css'
        ) }}"
    >

</head>

<body>

    <div class="navbar">

        <a href="/" class="logo">

    Shop<span>Smart</span>

</a>

        <a href="/" class="home-btn">
            Home
        </a>

    </div>

    <div class="auth-container">

        <form
    class="auth-form"
    method="POST"
>

    <h1>

        Create Your Account ✨

    </h1>

    <p class="auth-subtitle">

        Join ShopSmart and get personalized recommendations.

    </p>

    {% if error %}

    <div class="auth-error">

        {{ error }}

    </div>

    {% endif %}

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <input
        type="email"
        name="email"
        placeholder="Email Address"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">

        Create Account

    </button>

    <p class="auth-footer">

        Already have an account?

        <a href="/login">

            Login

        </a>

    </p>

</form>

    </div>

</body>

</html>
